<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for 3D effect -->
    <linearGradient id="foldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="edgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow for 3D depth -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Outer ring - representing the fold cycle -->
  <g transform="translate(200, 200)">
    <!-- 5 Fold segments (Pop, Wo, Sek, Chen, Xul) -->
    <path d="M 0,-140 A 140,140 0 0,1 132,-43 L 120,-35 A 125,125 0 0,0 0,-125 Z" 
          fill="url(#foldGradient)" opacity="0.8" filter="url(#shadow)">
      <title>Pop - Load/Input</title>
    </path>
    <path d="M 132,-43 A 140,140 0 0,1 82,114 L 70,105 A 125,125 0 0,0 120,-35 Z" 
          fill="url(#foldGradient)" opacity="0.85" filter="url(#shadow)">
      <title>Wo - Store/Build</title>
    </path>
    <path d="M 82,114 A 140,140 0 0,1 -82,114 L -70,105 A 125,125 0 0,0 70,105 Z" 
          fill="url(#foldGradient)" opacity="0.9" filter="url(#shadow)">
      <title>Sek - Execute/Compute</title>
    </path>
    <path d="M -82,114 A 140,140 0 0,1 -132,-43 L -120,-35 A 125,125 0 0,0 -70,105 Z" 
          fill="url(#foldGradient)" opacity="0.85" filter="url(#shadow)">
      <title>Chen - Collapse/Emit</title>
    </path>
    <path d="M -132,-43 A 140,140 0 0,1 0,-140 L 0,-125 A 125,125 0 0,0 -120,-35 Z" 
          fill="url(#foldGradient)" opacity="0.8" filter="url(#shadow)">
      <title>Xul - Terminate/Store</title>
    </path>
    
    <!-- Fold labels -->
    <text x="0" y="-95" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Arial" font-weight="bold">POP</text>
    <text x="90" y="-20" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Arial" font-weight="bold">WO</text>
    <text x="55" y="80" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Arial" font-weight="bold">SEK</text>
    <text x="-55" y="80" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Arial" font-weight="bold">CHEN</text>
    <text x="-90" y="-20" text-anchor="middle" fill="#e2e8f0" font-size="10" font-family="Arial" font-weight="bold">XUL</text>
    
    <!-- Direction arrows between folds -->
    <g fill="#94a3b8">
      <polygon points="125,-38 135,-35 125,-32"/>
      <polygon points="75,108 85,115 75,118"/>
      <polygon points="0,125 10,130 0,135"/>
      <polygon points="-75,108 -85,115 -75,118"/>
      <polygon points="-125,-38 -135,-35 -125,-32"/>
    </g>
  </g>
  
  <!-- Inner graph structure - nodes and edges -->
  <g transform="translate(200, 200)" filter="url(#glow)">
    <!-- Edges (graph connections) -->
    <g stroke="url(#edgeGradient)" stroke-width="2" fill="none">
      <path d="M 0,-40 L 35,-20" opacity="0.6"/>
      <path d="M 35,-20 L 50,10" opacity="0.7"/>
      <path d="M 50,10 L 20,35" opacity="0.8"/>
      <path d="M 20,35 L -20,35" opacity="0.9"/>
      <path d="M -20,35 L -50,10" opacity="0.8"/>
      <path d="M -50,10 L -35,-20" opacity="0.7"/>
      <path d="M -35,-20 L 0,-40" opacity="0.6"/>
      <path d="M 0,-40 L 20,35" opacity="0.4"/>
      <path d="M 35,-20 L -20,35" opacity="0.3"/>
    </g>
    
    <!-- Nodes (transformations) -->
    <g>
      <circle cx="0" cy="-40" r="6" fill="#f59e0b" filter="url(#shadow)">
        <title>Node: Root</title>
      </circle>
      <circle cx="35" cy="-20" r="5" fill="#10b981" filter="url(#shadow)">
        <title>Node: Transform</title>
      </circle>
      <circle cx="50" cy="10" r="5" fill="#3b82f6" filter="url(#shadow)">
        <title>Node: Compute</title>
      </circle>
      <circle cx="20" cy="35" r="5" fill="#8b5cf6" filter="url(#shadow)">
        <title>Node: Project</title>
      </circle>
      <circle cx="-20" cy="35" r="5" fill="#d946ef" filter="url(#shadow)">
        <title>Node: Emit</title>
      </circle>
      <circle cx="-50" cy="10" r="5" fill="#ef4444" filter="url(#shadow)">
        <title>Node: Store</title>
      </circle>
      <circle cx="-35" cy="-20" r="5" fill="#f59e0b" filter="url(#shadow)">
        <title>Node: Hash</title>
      </circle>
    </g>
  </g>
  
  <!-- Central kernel core -->
  <g transform="translate(200, 200)">
    <circle r="25" fill="url(#coreGradient)" filter="url(#glow)" opacity="0.9"/>
    <circle r="20" fill="#1e293b" opacity="0.8"/>
    
    <!-- K'UHUL glyph-inspired pattern -->
    <g fill="#f59e0b" opacity="0.9">
      <circle r="8"/>
      <rect x="-2" y="-12" width="4" height="8" rx="1"/>
      <rect x="-2" y="4" width="4" height="8" rx="1"/>
      <rect x="-12" y="-2" width="8" height="4" rx="1"/>
      <rect x="4" y="-2" width="8" height="4" rx="1"/>
    </g>
    
    <!-- Version badge -->
    <text y="22" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="Arial" font-weight="bold">v1.0</text>
  </g>
  
  <!-- Title text -->
  <text x="200" y="360" text-anchor="middle" fill="#e2e8f0" font-size="24" font-family="Arial" font-weight="bold">
    KUHUL
  </text>
  <text x="200" y="380" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial">
    TypeScript
  </text>
  
  <!-- Decorative corner elements (Mayan-inspired) -->
  <g fill="#6366f1" opacity="0.6">
    <rect x="20" y="20" width="8" height="8" rx="1"/>
    <rect x="372" y="20" width="8" height="8" rx="1"/>
    <rect x="20" y="372" width="8" height="8" rx="1"/>
    <rect x="372" y="372" width="8" height="8" rx="1"/>
  </g>
</svg>
